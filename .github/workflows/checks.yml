name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-lock.txt
      - name: Compile Python sources
        shell: pwsh
        run: |
          $files = Get-ChildItem scripts -Filter *.py | ForEach-Object FullName
          python -m py_compile $files
      - run: python scripts/test_solver.py
      - run: python scripts/test_safety.py
      - name: Check inline frontend JavaScript
        shell: pwsh
        run: node -e 'const fs=require("fs");const h=fs.readFileSync("app/index.html","utf8");for(const b of h.matchAll(/<script>([\s\S]*?)<\/script>/g))new Function(b[1]);'
