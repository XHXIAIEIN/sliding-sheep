<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>套住那只羊 · 网页求解</title>
<style>
@layer base, board, ui;

@layer base {
  :root {
    color-scheme: light dark;
    --bg: light-dark(oklch(97% 0.01 160), oklch(18% 0.015 220));
    --panel: light-dark(oklch(100% 0 0), oklch(23% 0.015 220));
    --line: light-dark(oklch(88% 0.015 160), oklch(32% 0.02 220));
    --text: light-dark(oklch(25% 0.02 200), oklch(92% 0.01 160));
    --muted: light-dark(oklch(50% 0.02 200), oklch(68% 0.015 200));
    --accent: oklch(55% 0.19 262);
    --ok: oklch(60% 0.15 155);
    --warn: oklch(65% 0.15 70);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.6 system-ui, "Segoe UI", "Microsoft YaHei UI", sans-serif;
  }
  button, textarea, input {
    font: inherit;
    color: inherit;
    accent-color: var(--accent);
  }
  button {
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: var(--panel);
    cursor: pointer;
    transition: border-color .15s, background .15s;

    &:hover:not(:disabled) { border-color: var(--accent); }
    &:disabled { opacity: .45; cursor: default; }
    &.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: oklch(98% 0 0);
      font-weight: 650;
    }
  }
}

@layer ui {
  .shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 18px clamp(12px, 3vw, 28px) 40px;
  }
  header.top {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding-block: 10px 18px;

    & h1 { margin: 0 auto 0 0; font-size: 20px; text-wrap: balance; }
    & .sub { color: var(--muted); font-size: 12px; width: 100%; }
  }
  main {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(260px, 1fr);
    gap: 16px;
    container-type: inline-size;

    @media (width < 860px) { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;

    & h2 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 650; }
  }
  #importPanel {
    inset: auto;
    margin: auto;
    width: min(560px, 92vw);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--text);
    padding: 16px;
    box-shadow: 0 24px 70px oklch(0% 0 0 / .3);

    &::backdrop { background: oklch(0% 0 0 / .35); backdrop-filter: blur(2px); }
    & textarea {
      width: 100%;
      min-height: 200px;
      field-sizing: content;
      max-height: 50vh;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      padding: 8px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
    }
    & footer { display: flex; gap: 8px; justify-content: end; margin-top: 10px; }
  }
  .status {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    align-items: baseline;
    margin-block: 8px;
    min-height: 1.5em;
    font-size: 13px;

    & b.kind { color: var(--accent); }
    & .remaining { color: var(--warn); }
    &:has(.solved) b.kind { color: var(--ok); }
  }
  #process {
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 12px;
    color: var(--muted);
    max-height: 180px;
    overflow-y: auto;

    & li { padding: 2px 0; border-bottom: 1px dashed color-mix(in oklch, var(--line), transparent 40%); }
    & li:last-child { border-bottom: 0; }
  }
  #steps {
    max-height: 420px;
    overflow-y: auto;
    font-size: 13px;

    & .step-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 5px 8px;
      border-radius: 8px;
      cursor: pointer;

      & .n { color: var(--muted); font-size: 11px; min-width: 2.2em; }
      & .phase { margin-left: auto; font-size: 11px; color: var(--muted); }
      &:hover { background: color-mix(in oklch, var(--accent), transparent 92%); }
      &[aria-current="step"] {
        background: color-mix(in oklch, var(--accent), transparent 85%);
        font-weight: 650;
      }
      /* 直接离场的步骤没有决策含量，弱化显示。 */
      &.exit { color: var(--muted); }
    }

    & details.exit-group {
      & summary {
        display: flex;
        gap: 8px;
        align-items: baseline;
        padding: 5px 8px;
        border-radius: 8px;
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;

        & .n { font-size: 11px; min-width: 2.2em; }
        &:hover { background: color-mix(in oklch, var(--accent), transparent 92%); }
      }
      & .step-row { margin-inline-start: 14px; }
      &:has([aria-current="step"]) > summary { color: var(--text); }
    }
  }
  .playback {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;

    & input[type="range"] { flex: 1; }
  }
}

@layer board {
  #boardWrap { container-type: inline-size; }
  #grid {
    --rows: 8;
    --cols: 6;
    display: grid;
    grid-template: repeat(var(--rows), 1fr) / repeat(var(--cols), 1fr);
    gap: 2px;
    aspect-ratio: var(--cols) / var(--rows);
    max-height: 74vh;
    margin-inline: auto;
    background: light-dark(oklch(90% 0.02 160), oklch(28% 0.02 220));
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 4px;
  }
  .cell {
    background: light-dark(oklch(96% 0.008 160), oklch(21% 0.015 220));
    border-radius: 3px;

    &.hazard {
      background: repeating-linear-gradient(45deg,
        oklch(60% 0.16 25 / .5) 0 6px, transparent 6px 12px);
    }
  }
  .piece {
    display: grid;
    place-items: center;
    border-radius: 6px;
    border: 1px solid oklch(0% 0 0 / .2);
    background: var(--piece, oklch(65% 0.13 262));
    color: oklch(99% 0 0);
    font-size: clamp(9px, 2.2cqw, 15px);
    font-weight: 700;
    view-transition-name: var(--vt, none);
    text-shadow: 0 1px 2px oklch(0% 0 0 / .4);

    & .id { letter-spacing: .02em; }
    & .arrow { font-size: .85em; opacity: .9; }

    &.selected {
      background: oklch(63% 0.23 25);
      z-index: 1;
      animation: pulse 1.2s ease-in-out infinite;
    }
  }
  @keyframes pulse {
    50% { background: oklch(74% 0.19 40); }
  }
  ::view-transition-group(*) { animation-duration: .22s; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <h1>套住那只羊 · 网页求解</h1>
    <button id="importButton" popovertarget="importPanel">导入 board.json</button>
    <button id="sampleButton">示例棋盘</button>
    <label>时限 <input id="timeout" type="number" min="1" max="60" value="10" style="width:4em"> 秒</label>
    <button id="solveButton" class="primary">求解</button>
    <button id="cancelButton" hidden>停止</button>
    <p class="sub">求解在 Web Worker（TypeScript 引擎）中运行；点击步骤或拖动进度条在沙盘中回放。识别与执行仍在桌面端。</p>
  </header>

  <div id="importPanel" popover>
    <h2>粘贴 board.json</h2>
    <textarea id="importText" spellcheck="false"
      placeholder='{"rows":8,"cols":6,"model":"facing","slide_mode":"all","pieces":{...}}'></textarea>
    <footer>
      <button popovertarget="importPanel" popovertargetaction="hide">取消</button>
      <button id="importConfirm" class="primary">载入</button>
    </footer>
  </div>

  <main>
    <section class="panel" id="boardWrap">
      <h2>棋盘</h2>
      <div id="grid" role="img" aria-label="棋盘"></div>
      <div class="playback">
        <button id="prevStep">上一步</button>
        <button id="nextStep">下一步</button>
        <input id="stepSlider" type="range" min="0" max="0" value="0" aria-label="回放进度">
        <span id="stepLabel">初始局面</span>
      </div>
    </section>
    <section class="panel">
      <h2>求解</h2>
      <div class="status" id="status"><span class="muted">导入或使用示例棋盘，然后点击求解。</span></div>
      <h2>算法过程</h2>
      <ol id="process"></ol>
      <h2>步骤</h2>
      <div id="steps"></div>
    </section>
  </main>
</div>

<script type="module">
import { Board, DIRS } from "./js/solver/index.js";

const $ = (sel) => document.querySelector(sel);
const ui = {
  grid: $("#grid"), status: $("#status"), process: $("#process"),
  steps: $("#steps"), slider: $("#stepSlider"), stepLabel: $("#stepLabel"),
  solve: $("#solveButton"), cancel: $("#cancelButton"), timeout: $("#timeout"),
};

const SPECIES = {
  sheep: { color: "oklch(58% 0.16 262)", mark: "羊" },
  rocket: { color: "oklch(55% 0.2 300)", mark: "火" },
  bomb: { color: "oklch(55% 0.2 25)", mark: "炸" },
  pink_sheep: { color: "oklch(65% 0.19 350)", mark: "粉" },
  black_sheep: { color: "oklch(30% 0.02 260)", mark: "黑" },
  pig: { color: "oklch(58% 0.13 55)", mark: "猪" },
  cattle: { color: "oklch(50% 0.1 65)", mark: "牛" },
  goat: { color: "oklch(52% 0.1 180)", mark: "山" },
  elephant: { color: "oklch(55% 0.03 260)", mark: "象" },
};
const ARROWS = { U: "↑", D: "↓", L: "←", R: "→" };

// level172 布局：能同时看到直出闭包与搜索分段。
const SAMPLE = {
  rows: 8, cols: 6, model: "facing", slide_mode: "all", hazards: [],
  pieces: Object.fromEntries(Object.entries({
    54: [[[0,1],[1,1]],"D"], 55: [[[0,2],[0,3]],"L"], 56: [[[0,4],[0,5]],"R"],
    59: [[[1,2],[2,2]],"D"], 60: [[[1,3],[1,4]],"R"], 61: [[[1,5],[2,5]],"D"],
    64: [[[2,0],[2,1]],"R"], 65: [[[2,3],[2,4]],"R"], 69: [[[3,1],[4,1]],"D"],
    70: [[[3,2],[4,2]],"D"], 71: [[[3,3],[3,4]],"R"], 72: [[[3,5],[4,5]],"D"],
    77: [[[4,3],[4,4]],"R"], 80: [[[5,1],[5,2]],"R"], 81: [[[5,3],[6,3]],"U"],
    82: [[[5,4],[6,4]],"D"], 85: [[[6,1],[6,2]],"R"], 88: [[[7,2],[7,3]],"R"],
  }).map(([id, [cells, facing]]) => [id, { cells, facing, species: "sheep" }])),
};

const state = {
  data: null,
  worker: null,
  steps: [],          // [{...move, phase}]
  boards: [],         // 回放局面序列（懒生成）
  index: 0,
};

function setStatus(html) { ui.status.innerHTML = html; }

function renderBoard(board, highlightId = null) {
  const draw = () => {
    ui.grid.style.setProperty("--rows", board.rows);
    ui.grid.style.setProperty("--cols", board.cols);
    ui.grid.replaceChildren();
    const hazardCells = new Set([...board.hazards]);
    for (let r = 0; r < board.rows; r++) {
      for (let c = 0; c < board.cols; c++) {
        const div = document.createElement("div");
        div.className = "cell";
        if (hazardCells.has((r << 7) | c)) div.classList.add("hazard");
        div.style.gridArea = `${r + 1} / ${c + 1}`;
        ui.grid.append(div);
      }
    }
    for (const [pid, piece] of board.pieces) {
      const rows = piece.cells.map((c) => c >> 7);
      const cols = piece.cells.map((c) => c & 127);
      const r0 = Math.min(...rows), r1 = Math.max(...rows);
      const c0 = Math.min(...cols), c1 = Math.max(...cols);
      const div = document.createElement("div");
      div.className = "piece";
      if (pid === highlightId) div.classList.add("selected");
      const style = SPECIES[piece.species] ?? SPECIES.sheep;
      div.style.setProperty("--piece", style.color);
      div.style.setProperty("--vt", `p-${pid.replaceAll(/\W/g, "_")}`);
      div.style.gridArea = `${r0 + 1} / ${c0 + 1} / ${r1 + 2} / ${c1 + 2}`;
      div.innerHTML = `<span><span class="id">${pid}</span><span class="arrow">${
        piece.facing ? ARROWS[piece.facing] : ""}</span></span>`;
      div.title = `#${pid} ${style.mark}（${piece.species}）${piece.facing ?? ""}`;
      ui.grid.append(div);
    }
  };
  document.startViewTransition?.(draw) ?? draw();
}

function boardAt(index) {
  // 懒生成回放局面：boards[i] = 应用前 i 步后的局面。
  while (state.boards.length <= index) {
    const prev = state.boards[state.boards.length - 1];
    const step = state.steps[state.boards.length - 1];
    state.boards.push(prev.apply(step));
  }
  return state.boards[index];
}

function stepRow(step, index) {
  const row = document.createElement("div");
  row.className = `step-row${step.result === "EXIT" ? " exit" : ""}`;
  row.dataset.step = index;
  row.innerHTML = `<span class="n">${index + 1}</span>
    #${step.pieceId} ${ARROWS[step.direction]} ${
      step.result === "EXIT" ? "离场" : `${step.distance} 格`}
    <span class="phase">${step.phase === "coarse" ? "直出" : "关键"}</span>`;
  row.addEventListener("click", () => showStep(index));
  return row;
}

function renderSteps(steps) {
  // 连续的直接离场步骤没有决策含量：折叠成组，保持列表聚焦在关键步上。
  const frag = document.createDocumentFragment();
  let i = 0;
  while (i < steps.length) {
    let j = i;
    while (j < steps.length && steps[j].result === "EXIT") j += 1;
    if (j - i >= 2) {
      const details = document.createElement("details");
      details.className = "exit-group";
      const summary = document.createElement("summary");
      summary.innerHTML = `<span class="n">${i + 1}–${j}</span>直接离场 ×${j - i}`;
      details.append(summary);
      for (let k = i; k < j; k++) details.append(stepRow(steps[k], k));
      frag.append(details);
      i = j;
    } else {
      frag.append(stepRow(steps[i], i));
      i += 1;
    }
  }
  ui.steps.replaceChildren(frag);
}

function showStep(index) {
  // index = 已执行的步数；棋盘显示执行前局面，高亮即将点击的羊。
  state.index = index;
  const next = state.steps[index] ?? null;
  renderBoard(boardAt(index), next?.pieceId ?? null);
  ui.slider.value = index;
  ui.stepLabel.textContent = next
    ? `第 ${index + 1} 步 · 点 #${next.pieceId} ${ARROWS[next.direction]}${
        next.result === "EXIT" ? " 离场" : ` ${next.distance} 格`}`
    : state.steps.length ? "全部步骤执行完毕" : "初始局面";
  for (const row of ui.steps.querySelectorAll(".step-row")) {
    if (Number(row.dataset.step) === index) {
      row.setAttribute("aria-current", "step");
      const group = row.closest("details");
      if (group) group.open = true;
      row.scrollIntoView({ block: "nearest" });
    } else row.removeAttribute("aria-current");
  }
}

function loadData(data) {
  state.data = data;
  state.steps = [];
  state.boards = [Board.from(data)];
  state.index = 0;
  ui.steps.replaceChildren();
  ui.process.replaceChildren();
  ui.slider.max = 0;
  setStatus(`已载入 ${data.rows}×${data.cols} 棋盘 · ${Object.keys(data.pieces ?? {}).length} 只`);
  showStep(0);
}

function finishSolve(msg) {
  state.worker?.terminate();
  state.worker = null;
  ui.solve.disabled = false;
  ui.cancel.hidden = true;
  if (msg) setStatus(msg);
}

ui.solve.addEventListener("click", () => {
  if (!state.data || state.worker) return;
  ui.solve.disabled = true;
  ui.cancel.hidden = false;
  ui.process.replaceChildren();
  setStatus("求解中…");
  const worker = new Worker("./js/solver/worker.js", { type: "module" });
  state.worker = worker;
  worker.onmessage = ({ data: msg }) => {
    if (msg.type === "progress") {
      const li = document.createElement("li");
      const d = msg.data;
      li.textContent = `${msg.phase} · ${d.event ?? ""} ${d.remaining ?? ""}${
        d.elapsed_ms != null ? ` · ${d.elapsed_ms}ms` : ""}`;
      ui.process.append(li);
      ui.process.scrollTop = ui.process.scrollHeight;
      return;
    }
    if (msg.type !== "result") return;
    if (!msg.ok) { finishSolve(`求解失败：${msg.error}`); return; }
    state.steps = msg.steps;
    state.boards = [Board.from(state.data)];
    ui.slider.max = msg.steps.length;
    renderSteps(msg.steps);
    finishSolve(`<b class="kind${msg.solved ? " solved" : ""}">${msg.kind}</b>
      <span>${msg.steps.length} 步</span>
      ${msg.solved ? '<span class="solved">完整解</span>'
        : `<span class="remaining">剩 ${msg.remaining} 只 · 部分计划</span>`}`);
    showStep(0);
  };
  worker.postMessage({ type: "solve", board: state.data,
                       options: { timeoutS: Number(ui.timeout.value) || 10 } });
});

ui.cancel.addEventListener("click", () => finishSolve("已停止。"));
$("#sampleButton").addEventListener("click", () => loadData(SAMPLE));
$("#importConfirm").addEventListener("click", () => {
  try {
    const data = JSON.parse($("#importText").value);
    if (!data.rows || !data.cols) throw new Error("缺少 rows/cols");
    loadData(data);
    $("#importPanel").hidePopover();
  } catch (error) {
    setStatus(`导入失败：${error.message}`);
  }
});
$("#prevStep").addEventListener("click", () => showStep(Math.max(0, state.index - 1)));
$("#nextStep").addEventListener("click", () =>
  showStep(Math.min(state.steps.length, state.index + 1)));
ui.slider.addEventListener("input", () => showStep(Number(ui.slider.value)));

loadData(SAMPLE);
</script>
</body>
</html>
